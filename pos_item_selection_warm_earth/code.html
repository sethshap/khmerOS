<script>
    function animateSend() {
        const btn = event.currentTarget;
        const originalHtml = btn.innerHTML;
        const originalBg = btn.className;
        
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> <span>Processing...</span>';
        
        setTimeout(() => {
            btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> <span>Sent!</span>';
            btn.classList.add('bg-tertiary-container');
            btn.classList.add('text-on-tertiary-container');
            btn.classList.remove('bg-primary');
            btn.classList.remove('text-on-primary');
            
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.className = originalBg;
            }, 2000);
        }, 1000);
    }
</script>
