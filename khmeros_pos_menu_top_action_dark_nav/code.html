<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Source+Serif+4:wght@400;600&amp;family=Work+Sans:wght@400;500;600&amp;family=Libre+Caslon+Text:wght@400;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .active-category {
            border: 2px solid #4a3728 !important;
            background-color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(74, 55, 40, 0.1);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dcdad5; border-radius: 10px; }
        
        body {
            font-family: 'Libre Caslon Text', serif;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#4a3728",
                    "on-primary": "#ffffff",
                    "secondary": "#745853",
                    "background": "#fcf9f4",
                    "on-background": "#1c1b1b",
                    "surface": "#fcf9f4",
                    "on-surface": "#1c1b1b",
                    "surface-variant": "#f6f3ee",
                    "on-surface-variant": "#504442",
                    "outline": "#827472",
                    "outline-variant": "#dcdad5",
                    "surface-container": "#f1edeb",
                    "surface-container-low": "#f6f3ee",
                    "surface-container-lowest": "#ffffff",
                    "ebony": "#2b1613",
                    "cream": "#fcf9f4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "margin-desktop": "64px",
                    "lg": "48px",
                    "md": "24px",
                    "xl": "80px",
                    "gutter": "24px",
                    "margin-mobile": "20px",
                    "sm": "12px",
                    "xs": "4px",
                    "container-padding": "20px",
                    "touch-target-lg": "64px"
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "600"}],
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "700"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="bg-surface w-full top-0 sticky z-40 border-b border-outline-variant/30 flex justify-between items-center px-container-padding h-touch-target-lg">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined hover:bg-surface-container-high p-2 rounded-full transition-colors cursor-pointer active:opacity-70 text-primary" data-icon="arrow_back">arrow_back</button>
<h1 class="font-headline-md text-xl md:text-headline-md text-primary tracking-tight">Bistro POS</h1>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center gap-2 px-4 h-10 bg-primary text-on-primary font-label-md hover:bg-ebony active:scale-95 transition-all rounded-xl shadow-md">
<span>Send to Kitchen</span>
<span class="material-symbols-outlined text-lg" data-icon="send">send</span>
</button>
<span class="material-symbols-outlined cursor-pointer hover:bg-surface-container-high p-2 rounded-full transition-colors text-primary" data-icon="settings">settings</span>
</div>
</header>
<!-- Sub-header: Current Order Summary -->
<div class="bg-surface-container-low px-container-padding py-4 flex justify-between items-center border-b border-outline-variant/30">
<div class="flex items-center gap-3">
<div class="bg-primary text-on-primary w-10 h-10 flex items-center justify-center rounded-sm">
<span class="font-bold">F2</span>
</div>
<div>
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Active Table</p>
<h2 class="text-body-lg font-bold text-primary">Main Dining</h2>
</div>
</div>
<div class="text-right">
<p class="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold">Subtotal</p>
<p class="text-body-lg font-bold text-primary">$14.50</p>
</div>
</div>
<!-- Main Content: Category Grid -->
<main class="p-container-padding pb-48 max-w-5xl mx-auto">
<div class="grid grid-cols-2 md:grid-cols-3 gap-gutter">
<!-- Food Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant hover:border-primary transition-all active:scale-[0.98] rounded-xl group relative">
<span class="absolute top-3 right-3 bg-primary text-white font-label-sm px-2 py-0.5 rounded-full">4</span>
<span class="material-symbols-outlined text-4xl mb-4 text-primary" data-icon="restaurant">restaurant</span>
<span class="font-bold text-primary">Food</span>
</button>
<!-- Bar Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-primary transition-all active:scale-[0.98] rounded-xl group active-category">
<span class="material-symbols-outlined text-4xl mb-4 text-primary" data-icon="wine_bar">wine_bar</span>
<span class="font-bold text-primary">Bar</span>
</button>
<!-- Beer Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant hover:border-primary transition-all active:scale-[0.98] rounded-xl group">
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-primary" data-icon="sports_bar">sports_bar</span>
<span class="font-bold text-primary">Beer</span>
</button>
<!-- Coffee Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant hover:border-primary transition-all active:scale-[0.98] rounded-xl group relative">
<span class="absolute top-3 right-3 bg-primary text-white font-label-sm px-2 py-0.5 rounded-full">2</span>
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-primary" data-icon="coffee">coffee</span>
<span class="font-bold text-primary">Coffee</span>
</button>
<!-- Smoothie Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant hover:border-primary transition-all active:scale-[0.98] rounded-xl group">
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-primary" data-icon="blender">blender</span>
<span class="font-bold text-primary">Smoothie</span>
</button>
<!-- Drinks Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-lowest border border-outline-variant hover:border-primary transition-all active:scale-[0.98] rounded-xl group">
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-primary" data-icon="local_drink">local_drink</span>
<span class="font-bold text-primary">Drinks</span>
</button>
</div>
<!-- Secondary Section: Quick Select -->
<section class="mt-12">
<h3 class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-on-surface-variant mb-6 border-l-2 border-primary pl-3">Quick Select Popular Items</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/50 rounded-xl hover:shadow-md cursor-pointer group transition-all">
<div class="flex items-center gap-4">
<div class="w-14 h-14 bg-surface-container-low rounded-lg overflow-hidden border border-outline-variant/30">
<img class="w-full h-full object-cover" data-alt="Classic Espresso" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDypL56haabJfE1Ag3agfknppST4jITtM0JrDMICCTpxGoN4N31pVxrGRIdZKPt5IYpMyEP4_Gq3rYgTXxCGcG1fgeBdYJZry1IwOgXM6d7qky0WpMvsKLCQepP-TIaJLvwTUCjxUriGm8GkKKi3YZDH3DIdIw2wQs9I9IAVkNhUPodYMOL4L1K5tH-pDUyvQ7ly_kyFNbnn8mFcSXcuQQFzJbk-nIBAemnVTsUxL9Kwt_McrL-Nlm7JJfCOPdSNyIdaL1HuG2eSLY">
</div>
<div>
<p class="font-bold text-primary">Classic Espresso</p>
<p class="font-label-md text-secondary font-bold">$3.50</p>
</div>
</div>
<button class="material-symbols-outlined text-on-primary bg-primary p-2 rounded-xl hover:bg-ebony transition-colors shadow-sm" data-icon="add">add</button>
</div>
<div class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/50 rounded-xl hover:shadow-md cursor-pointer group transition-all">
<div class="flex items-center gap-4">
<div class="w-14 h-14 bg-surface-container-low rounded-lg overflow-hidden border border-outline-variant/30">
<img class="w-full h-full object-cover" data-alt="Avocado Toast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0s8403ZkyJ0i6o-d_UgiEfwKRnXGIE9Ns_7PuR2B0A48GsiiJArWlPYt5aaTrqhsyA-_U0u0q9Yy6WyPg0vdvaaJtWlps9_42q-5LEfXkqDG-1GbIh1fVD0djjesUD2ZSRdKaAiGcL4qp63Aw2eM18og5ThoG59cFjo28Z6PxNhGlbHifbkP6dvKsa10FptFn1DvmyH7KKcj6IHHYZHaH9yFw7pEKIJYA8v79IdlihRtlS8Egxf2Xc1W-PyYRBZLmR5ykjimZjMg">
</div>
<div>
<p class="font-bold text-primary">Avocado Toast</p>
<p class="font-label-md text-secondary font-bold">$11.00</p>
</div>
</div>
<button class="material-symbols-outlined text-on-primary bg-primary p-2 rounded-xl hover:bg-ebony transition-colors shadow-sm" data-icon="add">add</button>
</div>
</div>
</section>
</main>
<!-- Fixed Footer Area -->
<div class="fixed bottom-0 left-0 w-full z-50">
<!-- Order Summary Stripe (Just above nav) -->
<div class="bg-surface-container-lowest border-t border-outline-variant py-3 px-container-padding flex justify-between items-center shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
<div class="flex items-center gap-3">
<span class="font-bold text-sm bg-primary/10 text-primary px-2.5 py-1 rounded-lg">2 ITEMS</span>
<span class="text-xs uppercase tracking-wider text-on-surface-variant font-bold">Selected</span>
</div>
<div class="flex items-center gap-4">
<p class="font-bold text-primary">Total: <span class="text-secondary">$14.50</span></p>
<button class="material-symbols-outlined text-primary p-2 border border-outline-variant rounded-xl" data-icon="shopping_basket">shopping_basket</button>
</div>
</div>
<!-- High-Contrast Navigation (Ebony Background, Cream Icons) -->
<nav class="bg-ebony h-20 w-full flex items-center justify-around px-container-padding border-t border-white/10">
<button class="flex flex-col items-center justify-center gap-1 text-cream/70 hover:text-cream transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="home">home</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 text-cream">
<span class="material-symbols-outlined text-2xl" data-icon="bar_chart">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Sales</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 text-cream/70 hover:text-cream transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="inventory_2">inventory_2</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Inventory</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 text-cream/70 hover:text-cream transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="shopping_cart">shopping_cart</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Ordering</span>
</button>
<button class="flex flex-col items-center justify-center gap-1 text-cream/70 hover:text-cream transition-colors">
<span class="material-symbols-outlined text-2xl" data-icon="more_horiz">more_horiz</span>
<span class="text-[10px] font-bold uppercase tracking-widest">More</span>
</button>
</nav>
</div>
<script>
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', function() {
            this.style.opacity = '0.7';
            setTimeout(() => {
                this.style.opacity = '1';
            }, 100);
        });
    });
</script>
</body></html>
