</div>
<script>
        // Simple interactivity for demonstration
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                if (!this.disabled && !this.classList.contains('cursor-not-allowed')) {
                    this.style.opacity = '0.7';
                    setTimeout(() => {
                        this.style.opacity = '1';
                    }, 100);
                }
            });
        });

        // Zone tab selection logic
        const zoneTabs = document.querySelectorAll('.inline-flex button');
        zoneTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                zoneTabs.forEach(t => {
                    t.classList.remove('bg-surface', 'shadow-sm', 'text-primary');
                    t.classList.add('text-on-surface-variant');
                });
                tab.classList.add('bg-surface', 'shadow-sm', 'text-primary');
                tab.classList.remove('text-on-surface-variant');
            });
        });
    </script>
