<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&amp;family=Source+Serif+4:wght@400;600&amp;family=Work+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .active-category {
            border: 2px solid #75584d !important;
            background-color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(117, 88, 77, 0.1);
        }
        /* Custom scrollbar for clean UI */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d3c3c0; border-radius: 10px; }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#fed7ca",
                    "tertiary-fixed": "#ffe088",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#ffdbce",
                    "on-secondary-container": "#795c51",
                    "outline-variant": "#d3c3c0",
                    "on-tertiary-container": "#4e3d00",
                    "on-secondary-fixed": "#2b160f",
                    "tertiary-container": "#cba72f",
                    "on-secondary": "#ffffff",
                    "surface-bright": "#fdf8f6",
                    "surface-container-highest": "#e5e2e0",
                    "surface-container-high": "#ebe7e5",
                    "on-tertiary-fixed-variant": "#574500",
                    "primary-container": "#3e2723",
                    "surface-tint": "#745853",
                    "on-primary-fixed": "#2b1613",
                    "on-surface-variant": "#504442",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f4f0ee",
                    "error": "#ba1a1a",
                    "primary-fixed": "#ffdad4",
                    "on-tertiary-fixed": "#241a00",
                    "surface-dim": "#ddd9d7",
                    "on-background": "#1c1b1b",
                    "surface-variant": "#e5e2e0",
                    "tertiary-fixed-dim": "#e9c349",
                    "background": "#fdf8f6",
                    "on-primary-fixed-variant": "#5b403c",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#e3beb8",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed-dim": "#e4beb2",
                    "on-primary-container": "#ae8d87",
                    "surface-container-low": "#f7f3f1",
                    "surface": "#fdf8f6",
                    "primary": "#271310",
                    "on-tertiary": "#ffffff",
                    "surface-container": "#f1edeb",
                    "secondary": "#75584d",
                    "on-secondary-fixed-variant": "#5b4137",
                    "inverse-primary": "#e3beb8",
                    "outline": "#827472",
                    "on-surface": "#1c1b1b",
                    "inverse-surface": "#31302f",
                    "tertiary": "#735c00"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"

            "spacing": {
                    "base": "8px",
                    "margin-desktop": "64px",
                    "lg": "48px",
                    "md": "24px",
                    "xl": "80px",
                    "gutter": "24px",
                    "margin-mobile": "20px",
                    "sm": "12px",
                    "xs": "4px",
                    "container-padding": "20px",
                    "touch-target-lg": "64px"
            },
            "fontFamily": {
                    "label-sm": ["Work Sans"],
                    "headline-md": ["Playfair Display"],
                    "body-lg": ["Source Serif 4"],
                    "headline-lg-mobile": ["Playfair Display"],
                    "display-lg": ["Playfair Display"],
                    "body-md": ["Source Serif 4"],
                    "label-md": ["Work Sans"],
                    "headline-lg": ["Playfair Display"]
            },
            "fontSize": {
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.08em", "fontWeight": "600"}],
                    "headline-md": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-lg-mobile": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],

                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-lg": ["40px", {"lineHeight": "48px", "fontWeight": "700"}]

          },
        },
      }

<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md overflow-x-hidden">
<!-- Top Navigation Bar -->
<header class="bg-surface dark:bg-surface-container-low text-primary w-full top-0 sticky z-40 border-b border-primary-container/10 flex justify-between items-center px-container-padding h-touch-target-lg">
<div class="flex items-center gap-4">
<button class="material-symbols-outlined hover:bg-surface-container-high p-2 rounded-full transition-colors cursor-pointer active:opacity-70 text-primary" data-icon="arrow_back">arrow_back</button>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">Bistro POS</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined cursor-pointer hover:bg-surface-container-high p-2 rounded-full transition-colors text-primary" data-icon="settings">settings</span>
</div>
</header>
<!-- Sub-header: Current Order Summary -->
<div class="bg-surface-container px-container-padding py-4 flex justify-between items-center border-b border-outline-variant/30">
<div class="flex items-center gap-3">
<div class="bg-primary-container text-on-primary w-10 h-10 flex items-center justify-center rounded-sm">
<span class="font-label-md text-label-md">F2</span>
</div>
<div>
<p class="font-label-sm text-label-sm uppercase text-on-surface-variant">Active Table</p>
<h2 class="font-headline-md text-body-lg font-bold">Main Dining</h2>
</div>
</div>
<div class="text-right">
<p class="font-label-sm text-label-sm uppercase text-on-surface-variant">Subtotal</p>
<p class="font-body-lg font-bold text-secondary">$14.50</p>
</div>
</div>
<!-- Main Content: Category Grid -->
<main class="p-container-padding pb-32 max-w-5xl mx-auto">
<div class="grid grid-cols-2 md:grid-cols-3 gap-gutter">
<!-- Food Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-low border border-outline-variant hover:border-secondary transition-all active:scale-[0.98] rounded-xl group relative">
<span class="absolute top-3 right-3 bg-secondary text-white font-label-sm px-2 py-0.5 rounded-full">4</span>
<span class="material-symbols-outlined text-4xl mb-4 text-secondary group-hover:text-primary-container" data-icon="restaurant">restaurant</span>
<span class="font-headline-md text-body-md font-bold">Food</span>
</button>
<!-- Bar Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-low border border-secondary transition-all active:scale-[0.98] rounded-xl group active-category">
<span class="material-symbols-outlined text-4xl mb-4 text-secondary" data-icon="wine_bar">wine_bar</span>
<span class="font-headline-md text-body-md font-bold">Bar</span>
</button>
<!-- Beer Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-low border border-outline-variant hover:border-secondary transition-all active:scale-[0.98] rounded-xl group">
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-secondary" data-icon="sports_bar">sports_bar</span>
<span class="font-headline-md text-body-md font-bold">Beer</span>
</button>
<!-- Coffee Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-low border border-outline-variant hover:border-secondary transition-all active:scale-[0.98] rounded-xl group relative">
<span class="absolute top-3 right-3 bg-secondary text-white font-label-sm px-2 py-0.5 rounded-full">2</span>
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-secondary" data-icon="coffee">coffee</span>
<span class="font-headline-md text-body-md font-bold">Coffee</span>
</button>
<!-- Smoothie Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-low border border-outline-variant hover:border-secondary transition-all active:scale-[0.98] rounded-xl group">
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-secondary" data-icon="blender">blender</span>
<span class="font-headline-md text-body-md font-bold">Smoothie</span>
</button>
<!-- Drinks Category -->
<button class="flex flex-col items-center justify-center aspect-square bg-surface-container-low border border-outline-variant hover:border-secondary transition-all active:scale-[0.98] rounded-xl group">
<span class="material-symbols-outlined text-4xl mb-4 text-on-surface-variant group-hover:text-secondary" data-icon="local_drink">local_drink</span>
<span class="font-headline-md text-body-md font-bold">Drinks</span>
</button>
</div>
<!-- Secondary Section: Quick Select -->
<section class="mt-12">
<h3 class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-on-surface-variant mb-6 border-l-2 border-secondary pl-3">Quick Select Popular Items</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/50 rounded-xl hover:shadow-md cursor-pointer group transition-all">
<div class="flex items-center gap-4">
<div class="w-14 h-14 bg-surface-container rounded-lg overflow-hidden border border-outline-variant/30">
<img class="w-full h-full object-cover" data-alt="Classic Espresso" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDypL56haabJfE1Ag3agfknppST4jITtM0JrDMICCTpxGoN4N31pVxrGRIdZKPt5IYpMyEP4_Gq3rYgTXxCGcG1fgeBdYJZry1IwOgXM6d7qky0WpMvsKLCQepP-TIaJLvwTUCjxUriGm8GkKKi3YZDH3DIdIw2wQs9I9IAVkNhUPodYMOL4L1K5tH-pDUyvQ7ly_kyFNbnn8mFcSXcuQQFzJbk-nIBAemnVTsUxL9Kwt_McrL-Nlm7JJfCOPdSNyIdaL1HuG2eSLY">
</div>
<div>
<p class="font-body-md font-bold text-primary">Classic Espresso</p>
<p class="font-label-md text-secondary font-bold">$3.50</p>
</div>
</div>
<button class="material-symbols-outlined text-on-secondary bg-secondary p-2 rounded-full hover:bg-on-secondary-container transition-colors shadow-sm" data-icon="add">add</button>
</div>
<div class="flex items-center justify-between p-4 bg-surface-container-lowest border border-outline-variant/50 rounded-xl hover:shadow-md cursor-pointer group transition-all">
<div class="flex items-center gap-4">
<div class="w-14 h-14 bg-surface-container rounded-lg overflow-hidden border border-outline-variant/30">
<img class="w-full h-full object-cover" data-alt="Avocado Toast" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0s8403ZkyJ0i6o-d_UgiEfwKRnXGIE9Ns_7PuR2B0A48GsiiJArWlPYt5aaTrqhsyA-_U0u0q9Yy6WyPg0vdvaaJtWlps9_42q-5LEfXkqDG-1GbIh1fVD0djjesUD2ZSRdKaAiGcL4qp63Aw2eM18og5ThoG59cFjo28Z6PxNhGlbHifbkP6dvKsa10FptFn1DvmyH7KKcj6IHHYZHaH9yFw7pEKIJYA8v79IdlihRtlS8Egxf2Xc1W-PyYRBZLmR5ykjimZjMg">
</div>
<div>
<p class="font-body-md font-bold text-primary">Avocado Toast</p>
<p class="font-label-md text-secondary font-bold">$11.00</p>
</div>
</div>
<button class="material-symbols-outlined text-on-secondary bg-secondary p-2 rounded-full hover:bg-on-secondary-container transition-colors shadow-sm" data-icon="add">add</button>
</div>
</div>
</section>
</main>
<!-- Sticky Bottom Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-lowest shadow-[0_-8px_32px_rgba(39,19,16,0.1)] border-t border-outline-variant z-50" style="background-color: rgb(42, 31, 26); border-top-width: medium; border-top-style: none; border-top-color: currentcolor;">
<div class="max-w-5xl mx-auto px-container-padding h-24 flex items-center justify-between">
<div class="flex flex-col">
<div class="flex items-center gap-2">
<span class="font-label-sm bg-secondary-container text-on-secondary-container px-2 py-0.5 rounded-full" style="background-color: rgb(252, 249, 244); color: rgb(42, 31, 26);">2 ITEMS</span>
<span class="font-label-sm text-on-surface-variant" style="color: rgb(252, 249, 244); opacity: 0.8;">Selected</span>
</div>
<p class="font-body-lg font-bold text-primary mt-1" style="color: rgb(252, 249, 244);">Total: <span class="text-secondary" style="color: rgb(252, 249, 244);">$14.50</span></p>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center px-6 h-touch-target-lg border border-outline text-primary hover:bg-surface-container-low rounded-xl transition-colors" style="border-color: rgb(252, 249, 244); color: rgb(252, 249, 244); background: transparent;">
<span class="material-symbols-outlined" data-icon="shopping_basket">shopping_basket</span>
</button>
<button class="flex items-center justify-center gap-3 px-8 h-touch-target-lg bg-primary-container text-on-primary font-body-md font-bold hover:bg-primary active:scale-95 transition-all rounded-xl shadow-lg" style="background-color: rgb(252, 249, 244); color: rgb(42, 31, 26); border-width: medium; border-style: none; border-color: currentcolor; border-image: initial;">
<span class="">Send to Kitchen</span>
<span class="material-symbols-outlined text-xl" data-icon="send">send</span>
</button>
</div>
</div>
</div>
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                this.style.opacity = '0.7';
                setTimeout(() => {
                    this.style.opacity = '1';
                }, 100);
            });
        });
    </script>


</body></html>
