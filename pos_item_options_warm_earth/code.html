<script>
    function animateSend() {
        const btn = event.currentTarget;
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span>Processing...</span>';
        
        setTimeout(() => {
            btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> <span>Sent!</span>';
            btn.classList.replace('bg-primary', 'bg-tertiary-container');
            btn.classList.replace('text-on-primary', 'text-on-tertiary-container');
            
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.replace('bg-tertiary-container', 'bg-primary');
                btn.classList.replace('text-on-tertiary-container', 'text-on-primary');
            }, 2000);
        }, 1000);
    }
</script>
